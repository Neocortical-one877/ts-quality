    <text x="613" y="459" text-anchor="middle" fill="#DDD1FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700">Attestations</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="778" y="152" width="368" height="356" rx="24" fill="url(#panel)"/>
    <rect x="778.75" y="152.75" width="366.5" height="354.5" rx="23.25" stroke="url(#border)" stroke-opacity="0.72" stroke-width="1.5"/>

    <rect x="808" y="184" width="112" height="28" rx="14" fill="#0B2130" stroke="#173A55"/>
    <text x="864" y="202" text-anchor="middle" fill="#9EEAF9" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="14" font-weight="700">run.json</text>

    <text x="808" y="246" fill="#E2E8F0" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="18">confidence: <tspan fill="#67E8F9">81</tspan></text>
    <text x="808" y="282" fill="#E2E8F0" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="18">mutationScore: <tspan fill="#60A5FA">0.84</tspan></text>
    <text x="808" y="318" fill="#E2E8F0" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="18">boundary: <tspan fill="#A7F3D0">tracked</tspan></text>
    <text x="808" y="354" fill="#E2E8F0" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="18">attestation: <tspan fill="#C4B5FD">bound</tspan></text>

    <rect x="808" y="392" width="308" height="2" rx="1" fill="white" fill-opacity="0.08"/>
    <text x="808" y="430" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18">evidence → judgment → understanding</text>
    <text x="808" y="458" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18">governance → legitimacy</text>
  </g>

  <g>
    <rect x="92" y="522" width="278" height="28" rx="14" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.08"/>
    <text x="231" y="541" text-anchor="middle" fill="#D6E4FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="600">offline-first • inspectable • run-bound</text>
  </g>
</svg>
