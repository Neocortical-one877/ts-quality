  </g>

  <rect x="58" y="56" width="1164" height="528" rx="28" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>

  <g>
    <rect x="92" y="88" width="158" height="34" rx="17" fill="#0F172A" stroke="#334155"/>
    <circle cx="115" cy="105" r="6" fill="#67E8F9"/>
    <text x="132" y="111" fill="#D6E4FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">ts-quality</text>
  </g>

  <g>
    <text x="92" y="202" fill="white" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="78" font-weight="800">Deterministic trust</text>
    <text x="92" y="286" fill="white" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="78" font-weight="800">for TypeScript changes</text>
    <text x="92" y="336" fill="#C7D2FE" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="500">Built for agent-heavy systems that need mutation pressure, invariants,</text>
    <text x="92" y="376" fill="#C7D2FE" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="500">governance, and attestable authorization — not confidence theater.</text>
  </g>

  <g>
    <rect x="92" y="432" width="136" height="42" rx="21" fill="#0B2130" stroke="#18435A"/>
    <text x="160" y="459" text-anchor="middle" fill="#9EEAF9" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700">Mutation</text>

    <rect x="242" y="432" width="128" height="42" rx="21" fill="#13223C" stroke="#2D4F77"/>
    <text x="306" y="459" text-anchor="middle" fill="#B9CCFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700">Invariants</text>

    <rect x="384" y="432" width="140" height="42" rx="21" fill="#142238" stroke="#30506E"/>
    <text x="454" y="459" text-anchor="middle" fill="#AEE8D1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700">Governance</text>

