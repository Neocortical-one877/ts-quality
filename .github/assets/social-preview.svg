<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.48" stop-color="#0B172A"/>
      <stop offset="1" stop-color="#101B33"/>
    </linearGradient>
    <linearGradient id="glowA" x1="192" y1="96" x2="912" y2="472" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4" stop-opacity="0.38"/>
      <stop offset="0.5" stop-color="#60A5FA" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="glowB" x1="920" y1="112" x2="1160" y2="544" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="blur64" x="-200" y="-200" width="1680" height="1040" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="64"/>
    </filter>
    <filter id="shadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="panel" x1="782" y1="158" x2="1138" y2="498" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#111C33" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="border" x1="782" y1="158" x2="1146" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA" stop-opacity="0.8"/>
      <stop offset="0.55" stop-color="#22D3EE" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.55" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
